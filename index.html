<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kemenangan Minimalis</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        /* Desain Clean & Minimalist */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0ea5e9;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Mencegah scroll saat animasi partikel meledak */
            transition: background-color 0.5s ease;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 380px;
            text-align: center;
            position: relative;
            z-index: 10; /* Berada di atas partikel */
            border: 1px solid rgba(255,255,255,0.8);
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin: 0 0 1rem 0;
            font-weight: 600;
        }

        .total-amount {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 2.5rem;
            color: var(--text-main);
            transition: transform 0.2s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            text-align: center;
            background: #f8fafc;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        button.btn-add {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button.btn-add:hover { background: #1e293b; }
        button.btn-add:active { transform: scale(0.98); }

        .btn-reset {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 2rem;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .btn-reset:hover { color: #ef4444; }

        /* Container untuk partikel Anime.js */
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div id="particle-container"></div>

<div class="card" id="main-card">
    <h1>Total Terkumpul</h1>
    <div class="total-amount" id="display-total">Rp 0</div>

    <div class="input-group">
        <input type="number" id="amount" placeholder="Input nominal..." min="1">
        <button class="btn-add" onclick="tambahCuan()">Catat Pemasukan</button>
    </div>
    
    <button class="btn-reset" onclick="resetData()">Mulai Ulang</button>
</div>

<script>
    // State Aplikasi
    let totalCuan = 0;
    // Flag untuk memastikan animasi besar hanya diputar sekali saat pertama kali dicapai
    let flag1M = false; 
    let flag400M = false;

    // Load data saat halaman dibuka
    window.onload = function() {
        const savedData = localStorage.getItem('cuanCleanState');
        if (savedData) {
            const state = JSON.parse(savedData);
            totalCuan = state.total || 0;
            flag1M = state.f1M || false;
            flag400M = state.f400M || false;
            updateUI();
        }
    };

    function saveState() {
        localStorage.setItem('cuanCleanState', JSON.stringify({
            total: totalCuan,
            f1M: flag1M,
            f400M: flag400M
        }));
    }

    function formatRupiah(angka) {
        return 'Rp ' + angka.toLocaleString('id-ID');
    }

    function tambahCuan() {
        const inputElement = document.getElementById('amount');
        const amount = parseInt(inputElement.value);
        
        if (isNaN(amount) || amount <= 0) return;

        const totalSebelumnya = totalCuan;
        totalCuan += amount;
        
        inputElement.value = '';
        updateUI();
        saveState();

        // Logika Pemicu Animasi
        if (totalCuan >= 400000000 && !flag400M) {
            triggerSupernova();
            flag400M = true;
            saveState();
        } 
        else if (totalCuan >= 1000000 && !flag1M) {
            triggerStormOfLight();
            flag1M = true;
            saveState();
        } 
        else {
            // Animasi konfeti rutin untuk setiap input atau kelipatan 1000
            if (amount >= 1000 || Math.floor(totalCuan / 1000) > Math.floor(totalSebelumnya / 1000)) {
                triggerSmallWin();
            }
        }
    }

    function updateUI() {
        const display = document.getElementById('display-total');
        display.innerText = formatRupiah(totalCuan);
        
        // Efek bounce halus pada teks angka
        anime({
            targets: display,
            scale: [1.1, 1],
            duration: 400,
            easing: 'easeOutElastic(1, .8)'
        });
    }

    // --- BAGIAN ANIMASI ---

    // 1. Kemenangan Kecil (Konfeti Sederhana)
    function triggerSmallWin() {
        confetti({
            particleCount: 80,
            spread: 60,
            origin: { y: 0.65 },
            colors: ['#0ea5e9', '#cbd5e1', '#0f172a'],
            disableForReducedMotion: true
        });
    }

    // 2. Milestone 1 Juta (Badai Cahaya Minimalis)
    function triggerStormOfLight() {
        const container = document.getElementById('particle-container');
        const colors = ['#38bdf8', '#818cf8', '#fbbf24'];
        const fragments = document.createDocumentFragment();

        // Buat 100 partikel
        for (let i = 0; i < 100; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = Math.random() * 10 + 4 + 'px';
            p.style.height = p.style.width;
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            fragments.appendChild(p);
        }
        container.appendChild(fragments);

        // Animasikan partikel menyebar berputar
        anime({
            targets: '.particle',
            translateX: function() { return anime.random(-400, 400); },
            translateY: function() { return anime.random(-400, 400); },
            scale: [0, function() { return anime.random(1, 3); }, 0],
            opacity: [1, 0],
            duration: function() { return anime.random(1500, 3000); },
            easing: 'easeOutExpo',
            complete: function() {
                container.innerHTML = ''; // Bersihkan DOM setelah selesai
            }
        });
    }

    // 3. Milestone 400 Juta (Supernova)
    function triggerSupernova() {
        const container = document.getElementById('particle-container');
        const card = document.getElementById('main-card');
        const colors = ['#f59e0b', '#ef4444', '#8b5cf6', '#ffffff'];
        
        // Efek background layar menggelap sejenak
        document.body.style.backgroundColor = '#0f172a';
        setTimeout(() => document.body.style.backgroundColor = 'var(--bg-color)', 4000);

        // Efek guncangan pada kartu (Screen Shake)
        anime({
            targets: card,
            translateX: [
                {value: -10, duration: 50}, {value: 10, duration: 50},
                {value: -10, duration: 50}, {value: 10, duration: 50},
                {value: 0, duration: 50}
            ],
            easing: 'linear'
        });

        const fragments = document.createDocumentFragment();
        
        // Buat 250 partikel energi
        for (let i = 0; i < 250; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = Math.random() * 15 + 5 + 'px';
            p.style.height = p.style.width;
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.boxShadow = `0 0 ${Math.random() * 20 + 10}px ${p.style.background}`;
            fragments.appendChild(p);
        }
        container.appendChild(fragments);

        // Ledakan Supernova yang masif
        anime({
            targets: '.particle',
            translateX: function() { return anime.random(-800, 800); },
            translateY: function() { return anime.random(-800, 800); },
            scale: [0, function() { return anime.random(2, 5); }, 0],
            opacity: [1, 0.8, 0],
            duration: function() { return anime.random(2000, 5000); },
            delay: anime.stagger(2), // Munculnya berurutan cepat
            easing: 'easeOutCirc',
            complete: function() {
                container.innerHTML = ''; 
            }
        });
    }

    function resetData() {
        if(confirm('Mulai ulang dari nol? Histori pencapaian akan dihapus.')) {
            totalCuan = 0;
            flag1M = false;
            flag400M = false;
            saveState();
            updateUI();
        }
    }
</script>

</body>
</html>
